services:
  app:
    build: .
    container_name: studentlife-java
    env_file:
      - .env
    expose:
      - "5000"
    mem_limit: 1g
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/ssl/cloudflare:ro
    depends_on:
      app:
        condition: service_healthy
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - backend

networks:
  backend: